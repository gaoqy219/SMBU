var cur = null;
var sel = null;
var done = false;
var mfi = 0;
var app = document.getElementById('app');

function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
}

function tagCls(c) {
    if (c.indexOf('\u586b\u7a7a') >= 0 || c.indexOf('\u6c49\u5b57') >= 0) return 'tag-pk';
    if (c.indexOf('\u8fd0\u7b97') >= 0) return 'tag-or';
    if (c.indexOf('\u9009\u62e9') >= 0) return 'tag-bl';
    if (c.indexOf('\u5224\u65ad') >= 0) return 'tag-gn';
    if (c.indexOf('\u7ed5\u53e3\u4ee4') >= 0) return 'tag-pu';
    return 'tag-cy';
}

function optKey(s) {
    var m = s.match(/^([A-Da-d])[\.\s]/);
    return m ? m[1].toUpperCase() : s;
}

function showHome() {
    done = false; sel = null; cur = null;
    var h = '<div class="fi">';
    h += '<h1>\ud83c\udf38 \u96e8\u751f\u767e\u8c37 \u8bed\u901a\u56db\u6d77 \ud83c\udf38</h1>';
    h += '<div class="sub">2026\u56fd\u9645\u4e2d\u6587\u65e5\u7cfb\u5217\u6d3b\u52a8\u4e4b\u8c37\u96e8\u7b11\u76d2 \u00B7\u767e\u53d8SMBU</div>';
    h += '<div class="hero-icon">\ud83c\udf27\ufe0f\ud83c\udf3e</div>';
    h += '<p class="hero-desc">';
    h += '\u968f\u673a\u62bd\u53d6\u4e00\u9053\u9898\u76ee<br>\u7b54\u5bf9\u5373\u53ef\u89e3\u9501\u4e00\u5f20\u7b11\u8138 \ud83d\ude0a</p>';
    h += '<button class="btn" onclick="window._start()">\u5f00\u59cb\u7b54\u9898</button>';
    h += '</div>';
    app.innerHTML = h;
}

window._start = function() {
    cur = Q[Math.floor(Math.random() * Q.length)];
    sel = null; done = false; mfi = 0;
    renderQ();
};

function renderQ() {
    var h = '<div class="fi">';
    h += '<h1>\ud83c\udf38 \u96e8\u751f\u767e\u8c37 \u8bed\u901a\u56db\u6d77 \ud83c\udf38</h1>';
    h += '<div class="sub">2026\u56fd\u9645\u4e2d\u6587\u65e5\u7cfb\u5217\u6d3b\u52a8\u4e4b\u8c37\u96e8\u7b11\u76d2 \u767e\u53d8SMBU</div>';
    h += '<div class="tag ' + tagCls(cur.c) + '">' + esc(cur.c) + '</div>';

    if (cur.m === 'choice') h += buildChoice();
    else if (cur.m === 'math') h += buildMath();
    else if (cur.m === 'tf') h += buildTF();
    else if (cur.m === 'display') h += buildDisplay();
    else if (cur.m === 'read') h += buildRead();

    h += '<div id="fb" class="fb"></div>';

    if (cur.m === 'display' || cur.m === 'read') {
        h += '<button class="btn btng" id="passbtn" onclick="window._pass()">\u5b8c\u6210 \u2713</button>';
    } else {
        h += '<button class="btn" id="sbtn" onclick="window._submit()">\u63d0\u4ea4\u7b54\u6848</button>';
    }
    h += '<br><button class="btno hid" id="nbtn" onclick="window._start()">\u4e0b\u4e00\u9898 \u2192</button>';
    h += '<br><button class="btnw hid" id="retrybtn" onclick="window._start()">\u6362\u9053\u9898\u8bd5\u8bd5 \ud83d\udd04</button>';
    h += '</div>';
    app.innerHTML = h;

    if (cur.m === 'math') {
        var f = document.getElementById('mi0');
        if (f) f.focus();
    }
}

function buildChoice() {
    var h = '<div class="qb"><div class="qt">' + esc(cur.q) + '</div></div>';
    h += '<div class="opts" id="opts">';
    for (var i = 0; i < cur.o.length; i++) {
        var k = optKey(cur.o[i]);
        h += '<button class="ob" data-k="' + esc(k) + '" onclick="window._pick(this)">' + esc(cur.o[i]) + '</button>';
    }
    h += '</div>';
    return h;
}

function buildMath() {
    var parts = cur.q.split('##');
    var h = '<div class="qb"><div class="meq">';
    var idx = 0;
    for (var i = 0; i < parts.length; i++) {
        if (i > 0) {
            h += '(<input class="mi' + (idx === 0 ? ' fc' : '') + '" id="mi' + idx + '" type="text" readonly maxlength="2" data-i="' + idx + '" onfocus="window._mfocus(' + idx + ')">)';
            idx++;
        }
        if (parts[i]) {
            h += '<span>' + esc(parts[i]) + '</span>';
        }
    }
    h += '</div></div>';

    var nums = ['\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d','\u4e03','\u516b','\u4e5d','\u5341','\u767e','\u5343','\u4e07','\u4e24','\u53cc'];
    h += '<div class="np">';
    for (var j = 0; j < nums.length; j++) {
        h += '<button class="nb" onclick="window._tap(\'' + nums[j] + '\')">' + nums[j] + '</button>';
    }
    h += '<button class="nb" style="color:#e91e63" onclick="window._tap(\'\')">清除</button>';
    h += '</div>';
    return h;
}

function buildTF() {
    var h = '<div class="qb"><div class="qt">' + esc(cur.q) + '</div></div>';
    h += '<div class="tfw" id="tfw">';
    h += '<button class="tfb" data-v="1" onclick="window._ptf(this)">\u2714</button>';
    h += '<button class="tfb" data-v="0" onclick="window._ptf(this)">\u2718</button>';
    h += '</div>';
    return h;
}

function buildDisplay() {
    var h = '<div class="dbox">';
    h += '<div>' + esc(cur.q) + '</div>';
    if (cur.h) h += '<div class="qh">' + esc(cur.h) + '</div>';
    h += '</div>';
    return h;
}

function buildRead() {
    var chars = cur.q.split(/[\u3001,\uff0c\s]+/);
    var h = '<div class="qb"><div class="qt" style="margin-bottom:12px">\u8bf7\u6b63\u786e\u8bfb\u51fa\u4ee5\u4e0b\u6c49\u5b57\uff1a</div>';
    h += '<div class="cg">';
    for (var i = 0; i < chars.length; i++) {
        if (chars[i]) h += '<div class="cc">' + esc(chars[i]) + '</div>';
    }
    h += '</div>';
    if (cur.h) h += '<div class="qh">' + esc(cur.h) + '</div>';
    h += '</div>';
    return h;
}

window._pick = function(btn) {
    if (done) return;
    var all = document.querySelectorAll('.ob');
    for (var i = 0; i < all.length; i++) all[i].className = 'ob';
    btn.className = 'ob sel';
    sel = btn.getAttribute('data-k');
};

window._mfocus = function(idx) {
    mfi = idx;
    var all = document.querySelectorAll('.mi');
    for (var i = 0; i < all.length; i++) {
        all[i].className = (i === idx) ? 'mi fc' : 'mi';
    }
};

window._tap = function(ch) {
    if (done) return;
    var el = document.getElementById('mi' + mfi);
    if (!el) return;
    el.value = ch;
    var total = cur.a.length;
    if (mfi < total - 1) {
        window._mfocus(mfi + 1);
        var nxt = document.getElementById('mi' + (mfi));
        if (nxt) nxt.focus();
    }
};

window._ptf = function(btn) {
    if (done) return;
    var all = document.querySelectorAll('.tfb');
    for (var i = 0; i < all.length; i++) all[i].className = 'tfb';
    btn.className = 'tfb sel';
    sel = btn.getAttribute('data-v');
};

window._submit = function() {
    if (done) return;
    var fb = document.getElementById('fb');

    if (cur.m === 'choice') {
        if (!sel) { showWarn(fb, '\u26a0\ufe0f \u8bf7\u5148\u9009\u62e9\u4e00\u4e2a\u9009\u9879\uff01'); return; }
        var correct = (sel === cur.a);
        done = true;
        var all = document.querySelectorAll('.ob');
        for (var i = 0; i < all.length; i++) {
            var k = all[i].getAttribute('data-k');
            if (k === cur.a) all[i].className = 'ob ok';
            else if (all[i].className.indexOf('sel') >= 0 && k !== cur.a) all[i].className = 'ob no';
            else all[i].className = 'ob off';
        }
        showResult(fb, correct);
    }
    else if (cur.m === 'math') {
        var vals = [];
        for (var j = 0; j < cur.a.length; j++) {
            var el = document.getElementById('mi' + j);
            vals.push(el ? el.value.trim() : '');
        }
        if (vals.some(function(v){ return !v; })) { showWarn(fb, '\u26a0\ufe0f \u8bf7\u586b\u5199\u6240\u6709\u62ec\u53f7\u4e2d\u7684\u6c49\u5b57\uff01'); return; }
        done = true;
        var allOk = true;
        for (var k2 = 0; k2 < cur.a.length; k2++) {
            var el2 = document.getElementById('mi' + k2);
            if (vals[k2] === cur.a[k2]) { el2.className = 'mi ok'; }
            else { el2.className = 'mi no'; allOk = false; }
        }
        showResult(fb, allOk);
    }
    else if (cur.m === 'tf') {
        if (!sel) { showWarn(fb, '\u26a0\ufe0f \u8bf7\u5148\u9009\u62e9 \u2714 \u6216 \u2718\uff01'); return; }
        var isTrue = (sel === '1');
        var tfOk = (isTrue === cur.a);
        done = true;
        var tbs = document.querySelectorAll('.tfb');
        for (var t = 0; t < tbs.length; t++) {
            var bv = (tbs[t].getAttribute('data-v') === '1');
            if (bv === cur.a) tbs[t].className = 'tfb ok';
            else if (tbs[t].className.indexOf('sel') >= 0 && bv !== cur.a) tbs[t].className = 'tfb no';
            else tbs[t].className = 'tfb off';
        }
        showResult(fb, tfOk);
    }
};

function showResult(fb, ok) {
    var sbtn = document.getElementById('sbtn');
    var nbtn = document.getElementById('nbtn');
    var retrybtn = document.getElementById('retrybtn');
    if (ok) {
        fb.className = 'fb fb-ok';
        fb.innerHTML = '\ud83c\udf89 \u606d\u559c\u7b54\u5bf9\u4e86\uff0c\u5feb\u53bb\u89e3\u9501\u4e00\u5f20\u7b11\u8138\u5427 \ud83d\ude0a';
        if (sbtn) sbtn.className = 'btn hid';
        if (nbtn) nbtn.className = 'btno';
        if (retrybtn) retrybtn.className = 'btnw hid';
        fireConf();
    } else {
        fb.className = 'fb fb-no';
        fb.innerHTML = '\u274c \u7b54\u9519\u5566\uff01';
        if (sbtn) sbtn.className = 'btn hid';
        if (retrybtn) retrybtn.className = 'btnw';
    }
}

function showWarn(fb, msg) {
    fb.className = 'fb fb-no';
    fb.innerHTML = msg;
    setTimeout(function() { fb.className = 'fb'; fb.innerHTML = ''; }, 2000);
}

window._pass = function() {
    done = true;
    var fb = document.getElementById('fb');
    fb.className = 'fb fb-ok';
    fb.innerHTML = '\ud83c\udf89 \u606d\u559c\u5b8c\u6210\u6311\u6218\uff0c\u5feb\u53bb\u89e3\u9501\u4e00\u5f20\u7b11\u8138\u5427 \ud83d\ude0a';
    var gbtn = document.getElementById('passbtn');
    if (gbtn) gbtn.className = 'btn btng hid';
    var nbtn = document.getElementById('nbtn');
    if (nbtn) nbtn.className = 'btno';
    fireConf();
};

function fireConf() {
    var box = document.getElementById('confetti');
    var colors = ['#e91e63','#ff5722','#ff9800','#ffeb3b','#4caf50','#2196f3','#9c27b0','#00bcd4'];
    var h = '';
    for (var i = 0; i < 60; i++) {
        var c = colors[Math.floor(Math.random() * colors.length)];
        var l = Math.random() * 100;
        var d = Math.random() * 1.5;
        var dur = 2 + Math.random() * 2;
        var sz = 8 + Math.random() * 10;
        var br = Math.random() > 0.5 ? 'border-radius:50%;' : '';
        h += '<div class="cp" style="left:' + l + '%;animation-delay:' + d + 's;animation-duration:' + dur + 's;width:' + sz + 'px;height:' + sz + 'px;background:' + c + ';' + br + '"></div>';
    }
    box.innerHTML = h;
    setTimeout(function() { box.innerHTML = ''; }, 5000);
}

function initPetals() {
    var box = document.getElementById('petals');
    var colors = ['#f48fb1','#f8bbd0','#fce4ec','#ef9a9a','#fff'];
    var h = '';
    for (var i = 0; i < 20; i++) {
        var c = colors[Math.floor(Math.random() * colors.length)];
        var l = Math.random() * 100;
        var sz = 10 + Math.random() * 14;
        var dur = 8 + Math.random() * 12;
        var delay = Math.random() * 15;
        h += '<div class="petal" style="left:' + l + '%;width:' + sz + 'px;height:' + sz + 'px;background:' + c + ';animation-duration:' + dur + 's;animation-delay:' + delay + 's"></div>';
    }
    box.innerHTML = h;
}

initPetals();
showHome();

})();
</script>
