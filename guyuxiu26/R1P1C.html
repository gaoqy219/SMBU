<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雨生百谷 语通四海</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdeaff 0%, #e0f7ff 50%, #f0ffe6 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-box {
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            max-width: 420px;
            border-radius: 25px;
            padding: 30px 25px;
            box-shadow: 0 8px 30px rgba(180, 180, 255, 0.2);
            text-align: center;
        }

        .title {
            font-size: 26px;
            color: #a880d8;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 14px;
            color: #74b9c7;
            margin-bottom: 30px;
        }

        .riddle-box {
            background: #f8f0ff;
            border-radius: 20px;
            padding: 25px 20px;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .riddle-text {
            font-size: 18px;
            color: #6a5acd;
            line-height: 1.6;
        }

        .input-area {
            margin: 25px 0;
        }

        #answer-input {
            width: 70%;
            height: 50px;
            border: 2px solid #c4e3f1;
            border-radius: 15px;
            text-align: center;
            font-size: 20px;
            outline: none;
            color: #555;
            transition: 0.3s;
        }

        #answer-input:focus {
            border-color: #a880d8;
            background: #fcf9ff;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .btn-submit {
            background: #a8d8ff;
            color: #2a72a5;
        }

        .btn-change {
            background: #c8ffd8;
            color: #2a9e55;
        }

        .btn:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }

        .tip {
            margin-top: 15px;
            font-size: 15px;
            height: 20px;
        }

        .error {
            color: #ff88a8;
        }

        .success {
            color: #50c8a8;
            font-weight: bold;
        }

        .result-box {
            margin-top: 20px;
            display: none;
        }

        .correct-char {
            font-size: 50px;
            color: #ff90c8;
            margin: 10px 0;
        }

        .correct-img {
            width: 100%;
            max-width: 220px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(200, 200, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="game-box">
        <h1 class="title">🌸 雨生百谷 语通四海 🌸</h1>
        <p class="subtitle">2026国际中文日系列活动之</p>
	<p class="subtitle">谷雨密语 · 汉字寻宝</p>
	<p class="subtitle">线路一 第一站</p>
        <div class="riddle-box">
            <p class="riddle-text" id="riddle-content"></p>
        </div>

        <div class="input-area">
            <input type="text" id="answer-input" placeholder="请输入答案" maxlength="1">
        </div>

        <div class="btn-group">
            <button class="btn btn-submit" onclick="checkAnswer()">提交答案</button>
            <button class="btn btn-change" onclick="changeRiddle()">换一题</button>
        </div>

        <div class="tip" id="tip-text"></div>

        <div class="result-box" id="result-box">
            <div class="correct-char" id="correct-char"></div>
            <img src="" class="correct-img" id="correct-img" alt="春日图片">
        </div>
    </div>

    <script>
        // 字谜题库（只保留谜面和答案）
        const riddleList = [
                { question: "白头到老", answer: "舌" },
    { question: "半布春秋", answer: "秦" },
    { question: "添丁进口", answer: "可" },
    { question: "综合门市", answer: "闹" },
    { question: "不是冤家也碰头", answer: "硼" },
    { question: "上气接下气", answer: "乞" },
    { question: "四方来合作，贡献大一点", answer: "器" },
    { question: "贪前稍变就成穷", answer: "贫" },
    { question: "半枕残香", answer: "休" },
    { question: "一流水准", answer: "淮" },
    { question: "拱猪入门", answer: "阂" },
    { question: "格外大方", answer: "回" },
    { question: "走出深闺人结识", answer: "佳" },
    { question: "一千零一夜", answer: "歼" },
    { question: "七十二小时", answer: "晶" },
        ];

        // ========== 固定显示的汉字和图片 ==========
        const FIXED_CHAR = "言";        // 所有题目答对都显示这个字
        const FIXED_IMAGE = "./1-1.jpg"; // 固定图片

        let currentIndex = 0;

        window.onload = function () {
            loadRiddle();
        };

        function loadRiddle() {
            document.getElementById("riddle-content").innerText = riddleList[currentIndex].question;
            document.getElementById("answer-input").value = "";
            document.getElementById("tip-text").innerText = "";
            document.getElementById("result-box").style.display = "none";
        }

        function changeRiddle() {
            currentIndex = Math.floor(Math.random() * riddleList.length);
            loadRiddle();
        }

        function checkAnswer() {
            const userInput = document.getElementById("answer-input").value.trim();
            const tipText = document.getElementById("tip-text");
            const correctAnswer = riddleList[currentIndex].answer;

            if (userInput === "") {
                tipText.innerText = "请输入答案哦~";
                tipText.className = "tip error";
                return;
            }

            if (userInput === correctAnswer) {
                // 猜对后统一显示固定字和图片
                tipText.innerText = "🎉 恭喜你答对啦！";
                tipText.className = "tip success";
                document.getElementById("correct-char").innerText = FIXED_CHAR;
                document.getElementById("correct-img").src = FIXED_IMAGE;
                document.getElementById("result-box").style.display = "block";
            } else {
                tipText.innerText = "❌ 答案不对，再试试吧！";
                tipText.className = "tip error";
                document.getElementById("result-box").style.display = "none";
            }
        }
    </script>
</body>
</html>
